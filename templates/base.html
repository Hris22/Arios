<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arios</title>
    <link rel="icon" type="image/png" href="/static/img/Arios_avatar.png">
    <!-- Tailwind & DaisyUI via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.11.1/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- HTMX via CDN -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script>
        document.addEventListener('htmx:configRequest', function(evt) {
            const token = localStorage.getItem('arios_token');
            if (token) {
                evt.detail.headers['Authorization'] = 'Bearer ' + token;
            }
        });
    </script>
    
    <!-- ApexCharts via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
</head>
<body class="bg-base-200 text-base-content h-screen flex flex-col">
    <!-- Navbar -->
    <div class="navbar bg-base-100 shadow-md">
        <div class="flex-1">
            <a href="/" class="btn btn-ghost text-xl font-bold">Arios</a>
        </div>
        <div class="flex-none gap-2">
            <a href="/admin" id="admin-panel-btn" class="btn btn-ghost hidden">Admin Panel</a>
            <!-- <div class="form-control hidden md:block" id="nav-search-container">
                <input type="text" placeholder="Search Crypto..." class="input input-bordered w-24 md:w-auto" />
            </div> -->
            <div class="dropdown dropdown-end" id="user-dropdown-container">
                <div tabindex="0" role="button" class="btn btn-ghost btn-circle avatar">
                    <div class="w-10 rounded-full bg-transparent">
                        <img src="/static/img/User_avatar.png" alt="User Avatar" />
                    </div>
                </div>
                <ul tabindex="0" class="mt-3 z-[1] p-2 shadow menu menu-sm dropdown-content bg-base-100 rounded-box w-52">
                    <li><a href="/profile">Profile</a></li>
                    <li><a id="logout-btn" class="text-error">Logout</a></li>
                </ul>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="flex-grow p-4 overflow-y-auto">
        {% block content %}{% endblock %}
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('arios_token');
            const path = window.location.pathname;
            
            const userDropdownContainer = document.getElementById('user-dropdown-container');
            const navSearchContainer = document.getElementById('nav-search-container');
            
            if (!token) {
                if (userDropdownContainer) userDropdownContainer.style.display = 'none';
                if (navSearchContainer) navSearchContainer.style.display = 'none';
            } else {
                try {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    if (payload.role === 'ADMIN') {
                        const adminBtn = document.getElementById('admin-panel-btn');
                        if (adminBtn) adminBtn.classList.remove('hidden');
                    }
                } catch (e) {
                    console.error('Error decoding token:', e);
                }
            }
            
            const logoutBtn = document.getElementById('logout-btn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', () => {
                    localStorage.removeItem('arios_token');
                    window.location.href = '/login';
                });
            }
        });
    </script>
</body>
</html>
