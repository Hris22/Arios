{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh]">
    <div class="card w-96 bg-base-100 shadow-xl">
        <div class="card-body">
            <h2 class="card-title justify-center text-2xl mb-4">Login to Arios</h2>
            
            <form id="login-form" class="space-y-4">
                <div class="form-control">
                    <label class="label">
                        <span class="label-text">Email</span>
                    </label>
                    <input type="email" id="email" placeholder="email@example.com" class="input input-bordered w-full" required />
                </div>
                
                <div class="form-control">
                    <label class="label">
                        <span class="label-text">Password</span>
                    </label>
                    <input type="password" id="password" placeholder="••••••••" class="input input-bordered w-full" required />
                </div>
                
                <div id="error-message" class="text-error text-sm hidden"></div>
                
                <div class="form-control mt-6">
                    <button type="submit" id="login-btn" class="btn btn-primary w-full">Login</button>
                </div>
            </form>
            
            <div class="divider">OR</div>
            
            <div class="text-center">
                <p class="text-sm">Don't have an account?</p>
                <a href="/register" class="link link-primary">Register here</a>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        // If already logged in, redirect to home
        if (localStorage.getItem('arios_token')) {
            window.location.href = '/';
        }

        const loginForm = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-message');
        const loginBtn = document.getElementById('login-btn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            errorMsg.classList.add('hidden');
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading loading-spinner"></span> Logging in...';

            try {
                const formData = new URLSearchParams();
                formData.append('username', email);
                formData.append('password', password);

                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('arios_token', data.access_token);
                    window.location.href = '/';
                } else {
                    errorMsg.textContent = data.detail || 'Login failed. Please check your credentials.';
                    errorMsg.classList.remove('hidden');
                }
            } catch (error) {
                errorMsg.textContent = 'An error occurred during login. Please try again.';
                errorMsg.classList.remove('hidden');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            }
        });
    });
</script>
{% endblock %}
